<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap 5</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light p-4">
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-6">
                <div class="border rounded p-3">
                    <h5 class="mb-3 fw-semibold">Form Đăng Ký Thông Tin</h5>
                    <form id="loginForm" novalidate>
                        <div>
                            <label for="fullname" class="form-label">Họ và tên</label>
                            <input type="text" class="form-control" id="fullname" name="fullname" required autofocus>
                            <div class="invalid-feedback">Hãy nhập họ và tên.</div>
                        </div>

                        <div>
                            <label for="email" class="form-label">Email</label>
                            <input type="text" class="form-control" id="email" name="email" required>
                            <div class="invalid-feedback">Hãy nhập email.</div>
                        </div>

                        <div>
                            <label for="phone" class="form-label">Số điện thoại</label>
                            <input type="number" class="form-control" id="phone" name="phone" required>
                            <div class="invalid-feedback">Hãy nhập số điện thoại.</div>
                        </div>

                        <div>
                            <label for="password" class="form-label">Mật khẩu</label>
                            <input type="text" class="form-control" id="password" name="password" required>
                            <div class="invalid-feedback">Hãy nhập mật khẩu.</div>
                        </div>

                        <div>
                            <label for="repassword" class="form-label">Nhập lại mật khẩu</label>
                            <input type="text" class="form-control" id="repassword" name="repassword" required>
                            <div class="invalid-feedback">Hãy nhập lại mật khẩu.</div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label d-block">Giới tính:</label>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="male">
                                <label class="form-check-label" for="male">Nam</label>
                            </div>
                            <div class="form-check form-check-inline">
                                <input class="form-check-input" type="radio" name="gender" id="female">
                                <label class="form-check-label" for="female">Nữ</label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Ngôn Ngữ</label>
                            <select class="form-select">
                                <option selected>Tiếng Việt</option>
                                <option>English</option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <input class="form-check-input" type="checkbox" value="1" id="agree" name="agree">
                            <label class="form-check-label" for="agree">Tôi đồng ý với các điều khoản và điều
                                kiện</label>
                        </div>

                        <button type="submit" class="btn btn-primary">Đăng Ký</button>
                    </form>
                </div>
            </div>

            <div class="col-md-6">
                <div class="border rounded p-3">
                    <h5 class="mb-3 fw-semibold">Form Đăng nhập</h5>
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" placeholder="Nhập email">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Mật Khẩu</label>
                            <input type="password" class="form-control" placeholder="Nhập mật khẩu">
                        </div>

                        <button type="submit" class="btn btn-primary">Đăng Nhập</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
