<!DOCTYPE html>
<html lang="en">

<head>
    <title>Bootstrap 5</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <header>
        <h1 style="color:red; text-align:center">Bảng Thành Phần Dinh Dưỡng </h1>
    </header>
    <main>
        <div class="container mt-5">
            <table class="table table-bordered">
                <thead>
                    <tr>
                        <th scope="col" rowspan="2" class="align-middle bg-warning text-center">Thành phần</th>
                        <th scope="col" colspan="2" class="text-body bg-warning text-center">Giá trị</th>
                    </tr>
                    <tr class="bg-warning">
                        <th scope="col" class="text-body bg-warning">Khối Lượng</th>
                        <th scope="col" class="text-body bg-warning">% DV*</th>
                    </tr>
                </thead>
                <tbody>
                    <tr class="p-3 bg-danger">
                        <td scope="row">Calories</td>
                        <td>200 kcal</td>
                        <td>20%</td>
                    </tr>
                    <tr class="p-3 bg-danger">
                        <td scope="row">Chất béo</td>
                        <td>9 g</td>
                        <td>14%</td>
                    </tr>
                    <tr class="p-3 bg-danger">
                        <td scope="row">Chất béo bão hòa</td>
                        <td>4 g</td>
                        <td>20%</td>
                    </tr>
                    <tr class="p-3 bg-danger">
                        <td scope="row">Chất đạm</td>
                        <td>8 g</td>
                        <td>16%</td>
                    </tr>
                    <tr class="p-3 bg-danger">
                        <td scope="row">Chất xơ</td>
                        <td>5 g</td>
                        <td>20%</td>
                    </tr>
                    <tr class="p-3 bg-danger">
                        <td scope="row">Đường</td>
                        <td>12 g</td>
                        <td>-</td>
                    </tr>
                    <tr class="p-3 bg-danger">
                        <td scope="row" rowspan="2" class="align-middle">Vitamin</td>
                        <td>Vitamin C</td>
                        <td>25%</td>
                    </tr>
                    <tr>
                        <td>Vitamin D</td>
                        <td>10%</td>
                    </tr>

                </tbody>
            </table>
        </div>

    </main>
    <footer>
    </footer>
</body>

</html>
